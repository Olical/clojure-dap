[tools]
java = "temurin-25"
clojure = "1.12.4.1629"
node = "22"

[tasks.test]
description = "Run all tests with Kaocha"
run = "clojure -M:test"

[tasks.format]
description = "Format code with cljfmt"
run = "clojure -M:format"

[tasks.repl]
description = "Start dev REPL with nREPL + CIDER + Rebel Readline"
run = "clojure -X:test:repl giants-shoulders.repl/start!"

[tasks.dap]
description = "Run the DAP server (stdin/stdout)"
run = "clojure -X clojure-dap.main/run"

[tasks.outdated]
description = "Check for outdated dependencies"
run = "clojure -M:outdated"

[tasks.update-dap-schema]
description = "Fetch the latest DAP JSON schema from Microsoft"
run = "curl https://microsoft.github.io/debug-adapter-protocol/debugAdapterProtocol.json >resources/clojure-dap/dap-json-schema.json"

[tasks.jar]
description = "Build the library JAR for Clojars"
run = "clojure -T:build jar"

[tasks.deploy]
description = "Deploy to Clojars"
run = "clojure -T:build deploy"

[tasks.vscode-package]
description = "Package the VS Code extension as a .vsix"
dir = "vscode-extension"
run = "npx @vscode/vsce package"
